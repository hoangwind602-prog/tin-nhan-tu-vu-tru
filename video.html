<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Golden Retriever x Black Cat</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.12), transparent 20%),
        radial-gradient(circle at 80% 25%, rgba(255,255,255,0.08), transparent 18%),
        linear-gradient(180deg, #f8d6c7 0%, #f6c6c3 22%, #d7c6ec 58%, #9eb9d8 100%);
      overflow: hidden;
      font-family: "Segoe UI", sans-serif;
    }

    /* ===== MAIN FRAME 3:4 ===== */
    .scene {
      position: relative;
      width: min(88vw, 540px);
      aspect-ratio: 3 / 4;
      overflow: hidden;
      border-radius: 34px;
      box-shadow:
        0 30px 80px rgba(69, 54, 77, 0.22),
        inset 0 0 0 1px rgba(255,255,255,0.35);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.03)),
        linear-gradient(180deg, #ffd8c8 0%, #f5c9c8 24%, #d8caeb 62%, #a8bdd6 100%);
      isolation: isolate;
    }

    /* ===== ATMOSPHERE ===== */
    .sun-glow {
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,244,208,0.92), rgba(255,216,176,0.35) 45%, transparent 72%);
      top: 40px;
      right: 38px;
      filter: blur(2px);
      opacity: 0.9;
      z-index: 1;
      animation: sunFloat 8s ease-in-out infinite;
    }

    @keyframes sunFloat {
      0%,100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(8px) scale(1.03); }
    }

    .cloud {
      position: absolute;
      background: rgba(255,255,255,0.72);
      border-radius: 999px;
      filter: blur(0.2px);
      z-index: 1;
      animation: cloudMove linear infinite;
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      background: inherit;
      border-radius: 50%;
    }

    .cloud1 {
      width: 90px;
      height: 30px;
      top: 88px;
      left: -110px;
      animation-duration: 18s;
    }

    .cloud1::before {
      width: 34px;
      height: 34px;
      left: 12px;
      top: -14px;
    }

    .cloud1::after {
      width: 42px;
      height: 42px;
      right: 10px;
      top: -16px;
    }

    .cloud2 {
      width: 72px;
      height: 24px;
      top: 140px;
      left: -90px;
      opacity: 0.7;
      animation-duration: 24s;
      animation-delay: -7s;
    }

    .cloud2::before {
      width: 28px;
      height: 28px;
      left: 10px;
      top: -11px;
    }

    .cloud2::after {
      width: 34px;
      height: 34px;
      right: 8px;
      top: -12px;
      }

    @keyframes cloudMove {
      from { transform: translateX(0); }
      to { transform: translateX(700px); }
    }

    .sparkle {
      position: absolute;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.9);
      box-shadow: 0 0 10px rgba(255,255,255,0.75);
      z-index: 2;
      animation: twinkle 3s ease-in-out infinite;
    }

    .sparkle::before,
    .sparkle::after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,0.75);
      border-radius: 999px;
    }

    .sparkle::before {
      width: 2px;
      height: 12px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    .sparkle::after {
      width: 12px;
      height: 2px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    @keyframes twinkle {
      0%,100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    /* ===== TREES / LAND ===== */
    .tree-line {
      position: absolute;
      bottom: 155px;
      left: 0;
      width: 100%;
      height: 120px;
      z-index: 2;
      opacity: 0.95;
    }

    .tree {
      position: absolute;
      bottom: 0;
    }

    .tree .crown {
      position: absolute;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      width: 72px;
      height: 62px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #b8efb7, #79b88f 70%, #5b8f77 100%);
      box-shadow: inset -8px -10px 10px rgba(0,0,0,0.05);
    }

    .tree .crown::before,
    .tree .crown::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      background: inherit;
    }

    .tree .crown::before {
      width: 42px;
      height: 42px;
      left: -10px;
      top: 14px;
    }

    .tree .crown::after {
      width: 44px;
      height: 44px;
      right: -8px;
      top: 10px;
    }

    .tree .trunk {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 12px;
      height: 34px;
      border-radius: 10px;
      background: #876a63;
    }

    .ground {
      position: absolute;
      bottom: 0;
      left: -5%;
      width: 110%;
      height: 190px;
      background:
        radial-gradient(circle at 30% 20%, rgba(255,255,255,0.10), transparent 30%),
        linear-gradient(180deg, #90c79d 0%, #74b58a 40%, #5d9972 100%);
      border-radius: 50% 50% 0 0 / 18% 18% 0 0;
      z-index: 3;
      box-shadow: inset 0 10px 20px rgba(255,255,255,0.08);
    }

    .path {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      width: 220px;
      height: 90px;
      background: radial-gradient(circle at 50% 10%, #f8e8cf, #e9d2b0 70%, #d8be97 100%);
      border-radius: 50%;
      z-index: 4;
      opacity: 0.92;
      filter: blur(0.3px);
      }

    /* ===== CHARACTER BASE ===== */
    .character {
      position: absolute;
      bottom: 112px;
      width: 118px;
      height: 188px;
      z-index: 10;
      transform-origin: center bottom;
    }

    .head {
      position: absolute;
      width: 76px;
      height: 76px;
      border-radius: 50%;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
      background: radial-gradient(circle at 35% 28%, #fff4ec, #f6d6c7 70%, #edc1ae 100%);
      box-shadow:
        inset -8px -10px 14px rgba(0,0,0,0.04),
        inset 6px 8px 10px rgba(255,255,255,0.3);
      z-index: 3;
    }

    .hair-back {
      position: absolute;
      width: 88px;
      height: 84px;
      left: 50%;
      top: 2px;
      transform: translateX(-50%);
      z-index: 2;
      border-radius: 50% 50% 45% 45%;
    }

    .body {
      position: absolute;
      width: 62px;
      height: 78px;
      left: 50%;
      top: 66px;
      transform: translateX(-50%);
      border-radius: 28px 28px 22px 22px;
      z-index: 2;
    }

    .arm {
      position: absolute;
      width: 16px;
      height: 54px;
      border-radius: 20px;
      top: 76px;
      background: #f3d0c0;
      z-index: 1;
      transform-origin: top center;
    }

    .arm.left { left: 20px; }
    .arm.right { right: 20px; }

    .leg {
      position: absolute;
      width: 18px;
      height: 58px;
      border-radius: 18px;
      top: 134px;
      background: #f3d0c0;
      z-index: 1;
      transform-origin: top center;
    }

    .leg.left { left: 38px; }
    .leg.right { right: 38px; }

    .shoe {
      position: absolute;
      width: 24px;
      height: 12px;
      border-radius: 20px;
      bottom: -6px;
      background: #ffffff;
      box-shadow: inset 0 -2px 0 rgba(0,0,0,0.06);
    }

    .leg.left .shoe { left: -3px; }
    .leg.right .shoe { left: -3px; }

    .eye {
      position: absolute;
      width: 7px;
      height: 11px;
      background: #43374a;
      border-radius: 50%;
      top: 31px;
      z-index: 4;
    }

    .eye.left { left: 24px; }
    .eye.right { right: 24px; }

    .blush {
      position: absolute;
      width: 14px;
      height: 8px;
      background: rgba(255, 140, 165, 0.28);
      border-radius: 50%;
      top: 42px;
      z-index: 4;
      filter: blur(0.2px);
    }

    .blush.left { left: 9px; }
    .blush.right { right: 9px; }

    .mouth {
      position: absolute;
      width: 14px;
      height: 8px;
      left: 50%;
      top: 47px;
      transform: translateX(-50%);
      border-bottom: 2px solid #624d5e;
      border-radius: 0 0 12px 12px;
      z-index: 4;
      }

    /* ===== GIRL ===== */
    .girl {
      left: 60px;
      animation: girlMove 10s linear infinite;
    }

    .girl .hair-back {
      background: radial-gradient(circle at 40% 25%, #4a3640, #35262f 72%, #241920 100%);
      height: 94px;
      border-radius: 48% 48% 44% 44%;
    }

    .girl .hair-front {
      position: absolute;
      width: 84px;
      height: 34px;
      left: 50%;
      top: 8px;
      transform: translateX(-50%);
      background: radial-gradient(circle at 40% 25%, #4a3640, #35262f 72%, #241920 100%);
      border-radius: 50% 50% 44% 44%;
      z-index: 5;
    }

    .girl .hair-side-left,
    .girl .hair-side-right {
      position: absolute;
      width: 20px;
      height: 46px;
      top: 18px;
      background: #35262f;
      z-index: 4;
      border-radius: 20px;
    }

    .girl .hair-side-left { left: 5px; transform: rotate(10deg); }
    .girl .hair-side-right { right: 5px; transform: rotate(-10deg); }

    .girl .bow {
      position: absolute;
      top: -4px;
      left: 50%;
      transform: translateX(-50%) rotate(-8deg);
      width: 26px;
      height: 18px;
      z-index: 6;
    }

    .girl .bow::before,
    .girl .bow::after {
      content: "";
      position: absolute;
      width: 12px;
      height: 16px;
      background: #f79fc2;
      border-radius: 60% 60% 60% 60%;
    }

    .girl .bow::before { left: 0; transform: rotate(-18deg); }
    .girl .bow::after { right: 0; transform: rotate(18deg); }

    .girl .bow-center {
      position: absolute;
      width: 8px;
      height: 8px;
      background: #ffbfd7;
      border-radius: 50%;
      left: 50%;
      top: 4px;
      transform: translateX(-50%);
      z-index: 7;
    }

    .girl .body {
      background: linear-gradient(180deg, #ffbfd7 0%, #f89ac0 100%);
      height: 82px;
      width: 66px;
      border-radius: 28px 28px 20px 20px;
    }

    .girl .skirt {
      position: absolute;
      width: 82px;
      height: 36px;
      left: 50%;
      top: 114px;
      transform: translateX(-50%);
      background: linear-gradient(180deg, #ffc9df 0%, #f6a9cb 100%);
      border-radius: 0 0 36px 36px;
      z-index: 2;
    }

    .girl .arm {
      animation: girlArms 0.8s ease-in-out infinite alternate;
    }

    .girl .leg.left {
      animation: legLeft 0.55s ease-in-out infinite alternate;
    }

    .girl .leg.right {
      animation: legRight 0.55s ease-in-out infinite alternate;
    }

    .girl .hair-back,
    .girl .skirt {
      animation: sway 1.2s ease-in-out infinite alternate;
      }

    /* ===== BOY ===== */
    .boy {
      left: calc(50% - 60px);
      animation: boyIdle 3s ease-in-out infinite;
    }

    .boy .head-wrap {
      position: absolute;
      inset: 0;
      animation: boyHeadFollow 10s linear infinite;
      transform-origin: center 38px;
    }

    .boy .hair-back {
      background: radial-gradient(circle at 40% 25%, #2f2f35, #1f1f25 72%, #15151b 100%);
      height: 78px;
      width: 84px;
    }

    .boy .hair-front {
      position: absolute;
      width: 82px;
      height: 30px;
      left: 50%;
      top: 8px;
      transform: translateX(-50%);
      background: radial-gradient(circle at 40% 25%, #2f2f35, #1f1f25 72%, #15151b 100%);
      border-radius: 50% 50% 44% 44%;
      z-index: 5;
    }

    .boy .body {
      background: linear-gradient(180deg, #f4f5f8 0%, #d9dde6 100%);
      width: 66px;
      height: 76px;
      border-radius: 24px;
    }

    .boy .shorts {
      position: absolute;
      width: 60px;
      height: 28px;
      left: 50%;
      top: 126px;
      transform: translateX(-50%);
      background: linear-gradient(180deg, #4f5666 0%, #353b47 100%);
      border-radius: 10px 10px 14px 14px;
      z-index: 2;
    }

    .boy .arm.left {
      transform: rotate(4deg);
      animation: armIdleLeft 2.4s ease-in-out infinite;
    }

    .boy .arm.right {
      transform: rotate(-4deg);
      animation: armIdleRight 2.4s ease-in-out infinite;
    }

    .boy .leg.left,
    .boy .leg.right {
      animation: none;
    }

    .boy .mouth {
      width: 12px;
      top: 48px;
      border-bottom: 2px solid #5f5666;
      border-radius: 0 0 12px 12px;
      opacity: 0.75;
    }

    .boy .sweat {
      position: absolute;
      width: 10px;
      height: 14px;
      background: linear-gradient(180deg, #b9dfff, #8fc2f0);
      border-radius: 50% 50% 60% 60%;
      right: 14px;
      top: 16px;
      z-index: 6;
      transform: rotate(16deg);
      animation: sweatBlink 10s linear infinite;
      opacity: 0;
    }

    .ellipsis {
      position: absolute;
      left: calc(50% + 28px);
      bottom: 290px;
      font-size: 26px;
      color: rgba(72, 64, 79, 0.68);
      z-index: 11;
      animation: ellipsisBlink 10s linear infinite;
      opacity: 0;
      font-weight: 700;
    }

    /* ===== SHADOW ===== */
    .shadow {
      position: absolute;
      bottom: 98px;
      width: 88px;
      height: 20px;
      border-radius: 50%;
      background: rgba(75, 82, 90, 0.18);
      filter: blur(4px);
      z-index: 5;
    }

    .girl-shadow {
      left: 76px;
      animation: girlShadowMove 10s linear infinite;
    }

    .boy-shadow {
      left: calc(50% - 46px);
      animation: boyShadowPulse 3s ease-in-out infinite;
      }

    /* ===== FLOAT HEARTS ===== */
    .heart {
      position: absolute;
      font-size: 18px;
      opacity: 0;
      z-index: 12;
      animation: heartFloat 10s linear infinite;
    }

    .heart.h1 { left: 38%; bottom: 190px; animation-delay: 1.8s; }
    .heart.h2 { left: 58%; bottom: 205px; animation-delay: 7.7s; }
    .heart.h3 { left: 50%; bottom: 230px; animation-delay: 8.5s; }

    @keyframes heartFloat {
      0%, 14%, 100% { opacity: 0; transform: translateY(0) scale(0.8); }
      16% { opacity: 1; }
      24% { opacity: 1; transform: translateY(-24px) scale(1.05); }
      30% { opacity: 0; transform: translateY(-42px) scale(1.1); }
    }

    /* ===== SIGNATURE ===== */
    .signature {
      position: absolute;
      bottom: 16px;
      width: 100%;
      text-align: center;
      font-size: 0.88rem;
      color: rgba(255,255,255,0.88);
      letter-spacing: 0.6px;
      z-index: 20;
      text-shadow: 0 2px 10px rgba(0,0,0,0.12);
    }

    /* ===== ANIMATIONS ===== */
    @keyframes girlMove {
      0% {
        transform: translate(0, 0) scaleX(1) rotate(0deg);
      }
      8% {
        transform: translate(32px, -6px) scaleX(1) rotate(-2deg);
      }
      16% {
        transform: translate(84px, 0px) scaleX(1) rotate(1deg);
      }
      24% {
        transform: translate(144px, -8px) scaleX(1) rotate(-4deg);
      }
      32% {
        transform: translate(182px, 0px) scaleX(1) rotate(4deg);
      }
      40% {
        transform: translate(150px, -18px) scaleX(-1) rotate(-10deg);
      }
      48% {
        transform: translate(88px, -4px) scaleX(-1) rotate(8deg);
      }
      56% {
        transform: translate(30px, -20px) scaleX(-1) rotate(-5deg);
      }
      64% {
        transform: translate(210px, 0px) scaleX(1) rotate(2deg);
      }
      72% {
        transform: translate(250px, -16px) scaleX(1) rotate(-8deg);
      }
      80% {
        transform: translate(170px, 2px) scaleX(-1) rotate(6deg);
      }
      90% {
        transform: translate(210px, -8px) scaleX(-1) rotate(-4deg);
      }
      100% {
        transform: translate(0, 0) scaleX(1) rotate(0deg);
      }
    }

    @keyframes girlShadowMove {
      0%   { transform: translateX(0) scale(1); }
      16%  { transform: translateX(84px) scale(1.04); }
      32%  { transform: translateX(182px) scale(1.08); }
      48%  { transform: translateX(88px) scale(0.98); }
      64%  { transform: translateX(210px) scale(1.06); }
      80%  { transform: translateX(170px) scale(1.02); }
      100% { transform: translateX(0) scale(1); }
    }

    @keyframes girlArms {
      0% { transform: rotate(-12deg); }
      100% { transform: rotate(18deg); }
    }

    @keyframes legLeft {
      0% { transform: rotate(16deg); }
      100% { transform: rotate(-18deg); }
    }

    @keyframes legRight {
      0% { transform: rotate(-16deg); }
      100% { transform: rotate(18deg); }
    }

    @keyframes sway {
      0% { transform: translateX(-50%) rotate(-2deg); }
      100% { transform: translateX(-50%) rotate(2deg); }
    }

    @keyframes boyIdle {
      0%,100% { transform: translateY(0px); }
      50% { transform: translateY(-3px); }
    }

    @keyframes boyShadowPulse {
      0%,100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(0.96); opacity: 0.85; }
    }

    @keyframes armIdleLeft {
      0%,100% { transform: rotate(4deg); }
      50% { transform: rotate(7deg); }
    }

    @keyframes armIdleRight {
      0%,100% { transform: rotate(-4deg); }
      50% { transform: rotate(-7deg); }
    }

    /* Boy follows girl softly */
    @keyframes boyHeadFollow {
      0%   { transform: rotate(-8deg); }
      18%  { transform: rotate(0deg); }
      32%  { transform: rotate(10deg); }
      46%  { transform: rotate(-6deg); }
      62%  { transform: rotate(12deg); }
      80%  { transform: rotate(2deg); }
      100% { transform: rotate(-8deg); }
    }

    @keyframes ellipsisBlink {
      0%, 7%, 100% { opacity: 0; transform: translateY(0); }
      8%, 16% { opacity: 0.7; transform: translateY(-4px); }
      17%, 31% { opacity: 0; transform: translateY(0); }
      32%, 40% { opacity: 0.8; transform: translateY(-4px); }
      41%, 61% { opacity: 0; }
      62%, 72% { opacity: 0.8; transform: translateY(-5px); }
      73%, 100% { opacity: 0; }
    }

    @keyframes sweatBlink {
      0%, 62%, 100% { opacity: 0; transform: rotate(16deg) translateY(0); }
      66%, 72% { opacity: 1; transform: rotate(16deg) translateY(2px); }
      76% { opacity: 0; transform: rotate(16deg) translateY(6px); }
      }

    /* Boy blink */
    .boy .eye {
      animation: blink 4.5s infinite;
      transform-origin: center;
    }

    @keyframes blink {
      0%, 45%, 47%, 100% { transform: scaleY(1); }
      46% { transform: scaleY(0.08); }
    }

    /* Girl face bounce */
    .girl .head-wrap {
      position: absolute;
      inset: 0;
      animation: girlHeadBounce 0.7s ease-in-out infinite alternate;
      transform-origin: center bottom;
    }

    @keyframes girlHeadBounce {
      0% { transform: rotate(-1deg) translateY(0); }
      100% { transform: rotate(2deg) translateY(-2px); }
    }

    /* ===== MOBILE POLISH ===== */
    @media (max-width: 600px) {
      .scene {
        width: 92vw;
        border-radius: 28px;
      }

      .signature {
        font-size: 0.82rem;
      }
    }
  </style>
</head>
<body>
  <div class="scene">

    <!-- atmosphere -->
    <div class="sun-glow"></div>
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>

    <div class="sparkle" style="top:70px; left:58px; animation-delay:0s;"></div>
    <div class="sparkle" style="top:118px; left:120px; animation-delay:1s;"></div>
    <div class="sparkle" style="top:90px; right:150px; animation-delay:1.6s;"></div>
    <div class="sparkle" style="top:170px; right:82px; animation-delay:2.2s;"></div>
    <div class="sparkle" style="top:210px; left:86px; animation-delay:2.8s;"></div>

    <!-- trees -->
    <div class="tree-line">
      <div class="tree" style="left:18px; transform:scale(0.9);">
        <div class="crown"></div><div class="trunk"></div>
      </div>
      <div class="tree" style="left:92px; transform:scale(0.72); opacity:0.92;">
        <div class="crown"></div><div class="trunk"></div>
      </div>
      <div class="tree" style="left:165px; transform:scale(1.02);">
        <div class="crown"></div><div class="trunk"></div>
      </div>
      <div class="tree" style="right:152px; transform:scale(0.78);">
        <div class="crown"></div><div class="trunk"></div>
      </div>
      <div class="tree" style="right:68px; transform:scale(1.04);">
        <div class="crown"></div><div class="trunk"></div>
      </div>
      <div class="tree" style="right:8px; transform:scale(0.82); opacity:0.92;">
        <div class="crown"></div><div class="trunk"></div>
      </div>
    </div>

    <!-- shadows -->
    <div class="shadow girl-shadow"></div>
    <div class="shadow boy-shadow"></div>

    <!-- girl -->
    <div class="character girl">
      <div class="head-wrap">
        <div class="hair-back"></div>
        <div class="head">
          <div class="hair-front"></div>
          <div class="hair-side-left"></div>
          <div class="hair-side-right"></div>
          <div class="bow"></div>
          <div class="bow-center"></div>

          <div class="eye left"></div>
