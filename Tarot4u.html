<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tôi lắng nghe bạn</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
color:#F5F5F5;
overflow:hidden;
}

/* 🌌 BACKGROUND */
.bg{
position:fixed;
width:100%;
height:100%;
background: radial-gradient(circle at top,#1a1a2e,#0f0f1a);
}
.stars{
position:absolute;
width:100%;
height:100%;
background-image: radial-gradient(white 1px, transparent 1px);
background-size: 40px 40px;
opacity:0.15;
animation: move 80s linear infinite;
}
@keyframes move{
from{transform:translateY(0);}
to{transform:translateY(-300px);}
}

/* SCREEN */
.screen{
display:none;
height:100vh;
padding:20px;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}
.active{display:flex;}

h1{
font-family:'Playfair Display',serif;
font-size:24px;
line-height:1.6;
}

/* INPUT */
textarea{
width:90%;
max-width:400px;
height:120px;
border-radius:12px;
border:none;
padding:15px;
font-size:15px;
}

/* BUTTON */
button{
margin-top:20px;
padding:12px 24px;
border-radius:10px;
border:none;
background:#6C63FF;
color:white;
}

/* 🎴 CARDS */
.cards{display:flex; gap:14px;}

.card{
width:90px;
height:150px;
border-radius:12px;
background:#222;
background-size:cover;
background-position:center;
cursor:pointer;
transition:.4s;
}
.card:hover{transform:scale(1.05);}

/* RESULT */
.result{
max-width:420px;
font-family:'Playfair Display',serif;
line-height:1.9;
font-size:16px;
text-align:left;
}
.small{font-size:12px;color:#aaa;}
</style>
</head>

<body>

<div class="bg"><div class="stars"></div></div>

<!-- SCENE 1 -->
<div id="scene1" class="screen active">
<h1>Có những điều… bạn chưa từng nói ra.</h1>
<button onclick="next(2)">Mình muốn được lắng nghe</button>
</div>

<!-- SCENE 2 -->
<div id="scene2" class="screen">
<textarea id="question" placeholder="Viết điều đang ở trong lòng bạn…"></textarea>
<div class="small">Đừng lo lắng tôi chỉ là người muốn lắng nghe bạn.</div>
<button onclick="startDraw()">Rút bài</button>
</div>

<!-- SCENE 3 -->
<div id="scene3" class="screen">
<div class="cards">
<div class="card" onclick="flipCard(0)"></div>
<div class="card" onclick="flipCard(1)"></div>
<div class="card" onclick="flipCard(2)"></div>
</div>
</div>

<!-- SCENE 4 -->
<div id="scene4" class="screen">
<div id="cardNames"></div>
<div id="reading" class="result"></div>
<button onclick="restart()">Hẹn gặp lại</button>
<p class="small">made by seri</p>
</div>

<script>

/* 🔮 22 LÁ TAROT */
const tarot = [
{name:"The Fool",img:"https://upload.wikimedia.org/wikipedia/commons/9/90/RWS_Tarot_00_Fool.jpg",past:"Bạn đã từng bắt đầu với một niềm tin rất thuần khiết.",present:"Bạn đang đứng trước một khởi đầu mới nhưng còn ngập ngừng.",future:"Có lẽ điều bạn cần không phải là chắc chắn, mà là can đảm thử một lần nữa.",reflection:["Bạn có đang sợ bắt đầu không?"]},
{name:"The Magician",img:"https://upload.wikimedia.org/wikipedia/commons/d/de/RWS_Tarot_01_Magician.jpg",past:"Bạn đã từng có khả năng tạo ra điều mình muốn.",present:"Bạn đang có nhiều hơn bạn nghĩ.",future:"Hãy tin rằng bạn đủ khả năng thay đổi tình hình.",reflection:["Bạn có đang đánh giá thấp bản thân không?"]},
{name:"The High Priestess",img:"https://upload.wikimedia.org/wikipedia/commons/8/88/RWS_Tarot_02_High_Priestess.jpg",past:"Bạn đã từng cảm nhận rất sâu sắc.",present:"Bạn cần lắng nghe trực giác.",future:"Câu trả lời nằm bên trong bạn.",reflection:["Bạn có đang bỏ qua cảm nhận của mình?"]},
{name:"The Empress",img:"https://upload.wikimedia.org/wikipedia/commons/d/d2/RWS_Tarot_03_Empress.jpg",past:"Bạn đã từng được yêu thương dịu dàng.",present:"Bạn cần chăm sóc bản thân.",future:"Sự mềm mại sẽ chữa lành bạn.",reflection:["Bạn đã chăm sóc tốt cho bản thân chưa?"]},
{name:"The Emperor",img:"https://upload.wikimedia.org/wikipedia/commons/c/c3/RWS_Tarot_04_Emperor.jpg",past:"Bạn đã từng cố kiểm soát mọi thứ.",present:"Bạn đang tìm sự ổn định.",future:"Sự vững vàng sẽ giúp bạn.",reflection:["Bạn có đang kiểm soát quá mức không?"]},
{name:"The Lovers",img:"https://upload.wikimedia.org/wikipedia/commons/d/db/RWS_Tarot_06_Lovers.jpg",past:"Đã từng có một kết nối sâu sắc.",present:"Bạn đang đứng trước lựa chọn cảm xúc.",future:"Hãy thành thật với trái tim.",reflection:["Bạn đang chọn vì yêu hay vì sợ?"]},
{name:"The Chariot",img:"https://upload.wikimedia.org/wikipedia/commons/3/3a/The_Chariot.jpg",past:"Bạn đã từng rất quyết tâm.",present:"Bạn đang cố tiến về phía trước.",future:"Bạn sẽ vượt qua nếu không bỏ cuộc.",reflection:["Bạn có đang đi đúng hướng không?"]},
{name:"Strength",img:"https://upload.wikimedia.org/wikipedia/commons/f/f5/RWS_Tarot_08_Strength.jpg",past:"Bạn đã từng mạnh mẽ hơn bạn nghĩ.",present:"Bạn cần kiên nhẫn.",future:"Sức mạnh thật là sự dịu dàng.",reflection:["Bạn có đang quá khắt khe với mình?"]},
{name:"The Hermit",img:"https://upload.wikimedia.org/wikipedia/commons/4/4d/RWS_Tarot_09_Hermit.jpg",past:"Bạn đã từng thu mình lại.",present:"Bạn đang tìm câu trả lời bên trong.",future:"Sự tĩnh lặng sẽ dẫn lối.",reflection:["Bạn có đang lắng nghe chính mình?"]},
{name:"Wheel of Fortune",img:"https://upload.wikimedia.org/wikipedia/commons/3/3c/RWS_Tarot_10_Wheel_of_Fortune.jpg",past:"Mọi thứ đã từng thay đổi.",present:"Bạn đang trong một chu kỳ.",future:"Mọi thứ sẽ tiếp tục xoay chuyển.",reflection:["Bạn có chấp nhận sự thay đổi?"]},
{name:"Justice",img:"https://upload.wikimedia.org/wikipedia/commons/e/e0/RWS_Tarot_11_Justice.jpg",past:"Bạn đã từng đối diện sự thật.",present:"Bạn cần nhìn rõ.",future:"Mọi thứ sẽ cân bằng.",reflection:["Bạn có đang công bằng với mình không?"]},
{name:"The Hanged Man",img:"https://upload.wikimedia.org/wikipedia/commons/2/2b/RWS_Tarot_12_Hanged_Man.jpg",past:"Bạn đã từng phải dừng lại.",present:"Bạn cần nhìn khác đi.",future:"Buông bỏ sẽ giúp bạn.",reflection:["Bạn có đang cố chấp không?"]},
{name:"Death",img:"https://upload.wikimedia.org/wikipedia/commons/d/d7/RWS_Tarot_13_Death.jpg",past:"Một điều đã kết thúc.",present:"Bạn đang chuyển mình.",future:"Khởi đầu mới đang tới.",reflection:["Bạn có đang níu giữ quá khứ?"]},
{name:"Temperance",img:"https://upload.wikimedia.org/wikipedia/commons/f/f8/RWS_Tarot_14_Temperance.jpg",past:"Bạn đã từng cố cân bằng.",present:"Bạn cần chậm lại.",future:"Sự hài hòa sẽ đến.",reflection:["Bạn có đang quá vội vàng?"]},
{name:"The Devil",img:"https://upload.wikimedia.org/wikipedia/commons/5/55/RWS_Tarot_15_Devil.jpg",past:"Bạn đã từng bị ràng buộc.",present:"Bạn đang mắc kẹt.",future:"Bạn có thể thoát ra.",reflection:["Điều gì đang giữ bạn lại?"]},
{name:"The Tower",img:"https://upload.wikimedia.org/wikipedia/commons/5/53/RWS_Tarot_16_Tower.jpg",past:"Một điều đã sụp đổ.",present:"Bạn đang đối diện sự thật.",future:"Sự thật sẽ giải phóng bạn.",reflection:["Bạn có đang trốn tránh?"]},
{name:"The Star",img:"https://upload.wikimedia.org/wikipedia/commons/d/db/RWS_Tarot_17_Star.jpg",past:"Bạn đã từng có niềm tin đẹp.",present:"Bạn đang chữa lành.",future:"Hy vọng sẽ quay lại.",reflection:["Bạn có tin mình sẽ ổn không?"]},
{name:"The Moon",img:"https://upload.wikimedia.org/wikipedia/commons/7/7f/RWS_Tarot_18_Moon.jpg",past:"Bạn đã từng mơ hồ.",present:"Bạn đang không rõ ràng.",future:"Hãy tin trực giác.",reflection:["Bạn có đang né tránh?"]},
{name:"The Sun",img:"https://upload.wikimedia.org/wikipedia/commons/1/17/RWS_Tarot_19_Sun.jpg",past:"Bạn đã từng rất rực rỡ.",present:"Bạn có cơ hội hạnh phúc.",future:"Ánh sáng sẽ trở lại.",reflection:["Bạn có cho phép mình được vui không?"]},
{name:"Judgement",img:"https://upload.wikimedia.org/wikipedia/commons/d/dd/RWS_Tarot_20_Judgement.jpg",past:"Bạn đã từng thức tỉnh.",present:"Bạn đang nhìn lại bản thân.",future:"Cơ hội mới mở ra.",reflection:["Bạn đã sẵn sàng để thay đổi chưa?"]},
{name:"The World",img:"https://upload.wikimedia.org/wikipedia/commons/f/ff/RWS_Tarot_21_World.jpg",past:"Bạn đã hoàn thành một chặng.",present:"Bạn đang chuyển giao.",future:"Một vòng mới bắt đầu.",reflection:["Bạn đã sẵn sàng bước tiếp chưa?, cố lên!"]}
];

/* LOGIC */
let selected=[];
let flipped=0;

function next(n){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById('scene'+n).classList.add('active');
}

function startDraw(){
selected=[]; flipped=0;
while(selected.length<3){
let c=tarot[Math.floor(Math.random()*tarot.length)];
if(!selected.includes(c)) selected.push(c);
}
document.querySelectorAll('.card').forEach(c=>c.style.background="#222");
next(3);
}

function flipCard(i){
if(i!==flipped) return;
const cards=document.querySelectorAll('.card');
cards[i].style.backgroundImage=`url(${selected[i].img})`;
flipped++;
if(flipped===3){setTimeout(showResult,1200);}
}

function generateReading(){
return `
Có thể bạn đã mang theo câu hỏi này trong lòng một khoảng thời gian khá lâu.

${selected[0].past}

Có những điều từ quá khứ vẫn âm thầm ảnh hưởng đến hiện tại của bạn.

${selected[1].present}

Hiện tại có thể chưa rõ ràng, nhưng đó là lúc bạn bắt đầu cảm nhận thay vì cố hiểu.

${selected[2].future}

Có lẽ bạn đang ở một giai đoạn chuyển tiếp, nơi mọi thứ chưa hoàn toàn rõ ràng, nhưng cũng không còn như trước nữa.

${selected[2].reflection[0]}
`;
}

function showResult(){
next(4);
document.getElementById('cardNames').innerText=selected.map(c=>c.name).join(" • ");
document.getElementById('reading').innerText=generateReading();
}

function restart(){location.reload();}

</script>

</body>
</html>
