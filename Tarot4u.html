<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tôi lắng nghe bạn</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
color:#F5F5F5;
background: radial-gradient(circle at top,#1a1a2e,#0f0f1a);
}

/* ⭐ nền sao nhưng KHÔNG chặn click */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background-image: radial-gradient(white 1px, transparent 1px);
background-size:40px 40px;
opacity:0.15;
animation:move 80s linear infinite;
pointer-events:none;
}

@keyframes move{
from{transform:translateY(0);}
to{transform:translateY(-300px);}
}

/* SCREEN */
.screen{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
position:relative;
z-index:2;
}
.active{display:flex;}

h1{
font-family:'Playfair Display';
font-size:24px;
}

/* INPUT */
textarea{
width:90%;
max-width:400px;
height:120px;
border-radius:12px;
border:none;
padding:15px;
}

/* BUTTON */
button{
margin-top:20px;
padding:12px 24px;
border-radius:10px;
border:none;
background:#6C63FF;
color:white;
cursor:pointer;
}

/* CARD */
.cards{display:flex;gap:12px;}

.card{
width:90px;
height:150px;
perspective:1000px;
cursor:pointer;
}

.inner{
width:100%;
height:100%;
position:relative;
transform-style:preserve-3d;
transition:transform .8s;
}

.card.flipped .inner{
transform:rotateY(180deg);
}

.front,.back{
position:absolute;
width:100%;
height:100%;
border-radius:12px;
backface-visibility:hidden;
}

.front{
background:linear-gradient(135deg,#2c2c4a,#1c1c2e);
display:flex;
align-items:center;
justify-content:center;
}

.back{
transform:rotateY(180deg);
background-size:cover;
background-position:center;
}

/* RESULT */
.result{
max-width:420px;
font-family:'Playfair Display';
line-height:1.9;
text-align:left;
}

.small{
font-size:12px;
color:#aaa;
}
</style>
</head>

<body>

<!-- SCENE 1 -->
<div id="s1" class="screen active">
<h1>Có những điều… bạn chưa từng nói ra.</h1>
<button id="btn1">Mình muốn được lắng nghe</button>
</div>

<!-- SCENE 2 -->
<div id="s2" class="screen">
<textarea placeholder="Viết điều trong lòng bạn..."></textarea>
<div class="small">đừng lo lắng tôi chỉ là người muốn lắng nghe bạn.</div>
<button id="btn2">Rút bài</button>
</div>

<!-- SCENE 3 -->
<div id="s3" class="screen">
<div class="cards">
<div class="card"><div class="inner"><div class="front">?</div><div class="back"></div></div></div>
<div class="card"><div class="inner"><div class="front">?</div><div class="back"></div></div></div>
<div class="card"><div class="inner"><div class="front">?</div><div class="back"></div></div></div>
</div>
</div>

<!-- SCENE 4 -->
<div id="s4" class="screen">
<div id="reading" class="result"></div>
  <button onclick="location.reload()">Hẹn gặp lại</button>
<p class="small">made by seri</p>
</div>

let pick=[]; let step=0;

function go(n){
  console.log("GO TO:", n); // để debug

  document.querySelectorAll(".screen").forEach(s=>{
    s.classList.remove("active");
  });

  const target = document.getElementById("s"+n);

  if(target){
    target.classList.add("active");
  }else{
    console.error("Không tìm thấy scene:", n);
  }
}

function draw(){
pick=[]; step=0;
while(pick.length<3){
let c=tarot[Math.floor(Math.random()*tarot.length)];
if(!pick.includes(c)) pick.push(c);
}
document.querySelectorAll(".card").forEach(c=>c.classList.remove("flipped"));
go(3);
}

function flip(i){
if(i!==step) return;
const cards=document.querySelectorAll(".card");
cards[i].classList.add("flipped");
cards[i].querySelector(".back").style.backgroundImage=`url('${pick[i].img}')`;
step++;
if(step===3){setTimeout(show,1200);}
}

function show(){
go(4);

document.getElementById("reading").innerHTML = `
<b>${pick[0].name} – Quá khứ</b><br>${pick[0].past}<br><br>
<b>${pick[1].name} – Hiện tại</b><br>${pick[1].present}<br><br>
<b>${pick[2].name} – Hướng đi</b><br>${pick[2].future}<br><br>

Có thể bạn đang ở một khoảng giữa — nơi mà những điều cũ vẫn còn ảnh hưởng, nhưng những điều mới đang dần hình thành.

Bạn không cần phải vội hiểu hết mọi thứ ngay lúc này.

Chỉ cần bạn vẫn ở đây… và vẫn lắng nghe chính mình, vậy là đủ rồi.
`;
}
